<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محاكي المقابلة الشفوية 2026 - الإصدار الشامل</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff0055; --dark-bg: #0d0d0f; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* شريط متحرك علوي */
        .marquee-container { background: rgba(0, 242, 255, 0.05); border-bottom: 1px solid var(--neon-blue); padding: 10px 0; overflow: hidden; white-space: nowrap; margin-bottom: 20px; }
        .marquee-text { display: inline-block; animation: marquee 25s linear infinite; color: var(--neon-blue); font-size: 1.1rem; font-weight: bold; }
        @keyframes marquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* التصميم الزجاجي */
        .glass-container { width: 100%; max-width: 1000px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); margin: auto; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .main-title { text-align: center; font-size: 2.2rem; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 30px; }
        .main-title span { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }

        /* الشبكة العلوية للقوائم */
        .grid-nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .nav-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; }
        .nav-card:hover { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .nav-card label { display: block; font-size: 0.9rem; color: var(--neon-pink); margin-bottom: 8px; font-weight: bold; }
        select { width: 100%; background: #1a1a1d; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; font-family: 'Tajawal'; cursor: pointer; }

        /* منطقة السؤال */
        .question-area { position: relative; background: #000; border-radius: 15px; padding: 50px 25px; min-height: 180px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 1.7rem; margin-bottom: 25px; border-right: 8px solid var(--neon-pink); box-shadow: inset 0 0 30px rgba(255,0,85,0.2); line-height: 1.7; }
        #counter { position: absolute; top: 15px; left: 20px; font-family: 'Orbitron'; color: var(--neon-blue); font-size: 1.1rem; }

        /* منطقة الإدخال */
        .input-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        textarea { width: 100%; height: 140px; background: rgba(0,0,0,0.6); border: 2px solid #444; border-radius: 15px; padding: 20px; color: #fff; font-family: 'Tajawal'; font-size: 1.2rem; resize: none; box-sizing: border-box; }
        .mic-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; cursor: pointer; font-size: 1.8rem; color: var(--neon-blue); transition: 0.3s; }
        .mic-active { color: var(--neon-pink); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* الأزرار */
        .action-bar { display: flex; gap: 15px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-family: 'Tajawal'; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .btn-new { background: #222; color: #fff; border: 1px solid #444; }
        .btn-check { background: var(--neon-pink); color: #fff; box-shadow: 0 0 20px rgba(255,0,85,0.4); }

        /* التغذية الراجعة */
        #feedback-area { display: none; margin-top: 30px; padding: 25px; border-radius: 15px; border: 2px solid; }
        .lcd-success { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(0,242,255,0.05); }
        .lcd-error { border-color: var(--neon-pink); color: var(--neon-pink); background: rgba(255,0,85,0.05); }
        .model-ans-box { margin-top: 15px; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; color: #eee; font-size: 1.1rem; border-right: 5px solid #fff; line-height: 1.8; }
        /* تحسينات خاصة بالهواتف */
@media (max-width: 600px) {
    .main-title {
        font-size: 1.5rem; /* تصغير العنوان ليتناسب مع عرض الهاتف */
    }

    .grid-nav {
        grid-template-columns: 1fr; /* جعل القوائم المنسدلة تظهر فوق بعضها */
        gap: 10px;
    }

    .nav-card {
        padding: 10px;
    }

    .action-bar {
        flex-direction: column; /* الأزرار فوق بعضها لتسهيل الضغط بالإبهام */
    }

    .btn {
        width: 100%;
        padding: 15px;
    }

    textarea {
        height: 120px;
        font-size: 1rem;
    }
}
    </style>
</head>
<body>

<div class="marquee-container">
    <div class="marquee-text">نظام رادار المقابلة الشفوية 2026 مفعل... 210 سؤال بانتظارك... بالتوفيق يا أستاذ...</div>
</div>

<div class="glass-container">
    <h1 class="main-title">رادار <span>المقابلة الشفوية</span> 2026</h1>

    <div class="grid-nav">
        <div class="nav-card">
            <label>1. الجانب الشخصي</label>
            <select id="sel-personal" onchange="updateSelection('personal', this.value)">
                <option value="0">التعريف بالهوية (15 سؤال)</option>
                <option value="1">أخلاقيات المهنة (15 سؤال)</option>
            </select>
        </div>
        <div class="nav-card">
            <label>2. البيداغوجيا والتشريع</label>
            <select id="sel-pedagogy" onchange="updateSelection('pedagogy', this.value)">
                <option value="0">أساسيات البيداغوجيا (15 سؤال)</option>
                <option value="1">التخطيط والتحضير (15 سؤال)</option>
                <option value="2">تشريع مدرسي 1 (15 سؤال)</option>
                <option value="3">تشريع مدرسي 2 (15 سؤال)</option>
            </select>
        </div>
        <div class="nav-card">
            <label>3. مادة التخصص (رياضيات)</label>
            <select id="sel-math" onchange="updateSelection('math', this.value)">
                <option value="0">حساب وجبر (15 سؤال)</option>
                <option value="1">هندسة مستوية (15 سؤال)</option>
                <option value="2">إحصاء واحتمالات (15 سؤال)</option>
                <option value="3">هندسة فضاء (15 سؤال)</option>
                <option value="4">تكنولوجيا التعليم (15 سؤال)</option>
            </select>
        </div>
        <div class="nav-card">
            <label>4. إدارة القسم</label>
            <select id="sel-management" onchange="updateSelection('management', this.value)">
                <option value="0">إدارة ومواقف (15 سؤال)</option>
                <option value="1">صعوبات التعلم (15 سؤال)</option>
                <option value="2">علاقات الأولياء (15 سؤال)</option>
            </select>
        </div>
    </div>

    <div class="question-area">
        <div id="counter">00</div>
        <div id="question-box">اضغط "سؤال جديد" للبدء</div>
    </div>

    <div class="input-wrapper">
        <textarea id="user-input" placeholder="اكتب إجابتك هنا أو انطقها..."></textarea>
        <button id="mic-btn" class="mic-btn" onclick="startVoiceRecognition()">🎤</button>
    </div>

    <div class="action-bar">
        <button class="btn btn-new" onclick="getNewQuestion()">سؤال جديد ⮕</button>
        <button class="btn btn-check" onclick="checkResponse()">تحليل الإجابة 📊</button>
    </div>

    <div id="feedback-area"></div>
</div>

<script>

// الدوال التشغيلية
let activeMain = 'personal';
let activeSub = 0;
let currentQIdx = 0;
let synth = window.speechSynthesis;

function updateSelection(main, sub) {
    activeMain = main;
    activeSub = parseInt(sub);
    getNewQuestion();
}

function getNewQuestion() {
    const list = masterDB[activeMain][activeSub];
    currentQIdx = Math.floor(Math.random() * list.length);
    const q = list[currentQIdx];
    
    document.getElementById('question-box').innerText = q.q;
    document.getElementById('user-input').value = "";
    document.getElementById('feedback-area').style.display = "none";
    document.getElementById('counter').innerText = `قسم: ${activeSub + 1} | سؤال: ${currentQIdx + 1}`;
    
    speak(q.q);
}

function speak(text) {
    if (synth.speaking) synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ar-SA';
    utter.rate = 0.95;
    synth.speak(utter);
}

function checkResponse() {
    const input = document.getElementById('user-input').value.trim();
    if (!input) return speak("اكتب إجابة أولاً");

    const q = masterDB[activeMain][activeSub][currentQIdx];
    let score = 0;
    q.key.forEach(k => { if(input.includes(k)) score++; });

    const area = document.getElementById('feedback-area');
    area.style.display = "block";
    const isOk = score >= 1;
    
    area.className = isOk ? 'lcd-success' : 'lcd-error';
    area.innerHTML = `<div>${isOk ? '✓ إجابة احترافية' : '✗ إجابة تحتاج تعزيزاً'}</div>
                      <div class="model-ans-box"><b>النموذج المقترح:</b> ${q.a}</div>`;
    
    speak(isOk ? "إجابة موفقة" : "إليك النموذج: " + q.a);
}

function startVoiceRecognition() {
    const btn = document.getElementById('mic-btn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("متصفحك لا يدعم التعرف الصوتي");

    const rec = new SpeechRecognition();
    rec.lang = 'ar-SA';
    rec.onstart = () => btn.classList.add('mic-active');
    rec.onresult = (e) => {
        document.getElementById('user-input').value = e.results[0][0].transcript;
        btn.classList.remove('mic-active');
    };
    rec.start();
}

window.onload = getNewQuestion;
</script>
</body>
</html>
